<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Image Upload</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        pre { background-color: #f8f9fa; padding: 15px; border: 1px solid #ddd; overflow-x: auto; }
    </style>
</head>
<body>
    <h2>Test Vendor Image Upload</h2>
    <p>Use this tool to test the POST upload route instead of visiting it in your browser directly.</p>

    <div class="form-group">
        <label for="token">Your Vendor JWT Token (without "Bearer "):</label>
        <input type="text" id="token" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
    </div>

    <div class="form-group">
        <label for="image">Select Image:</label>
        <input type="file" id="image" accept="image/*">
    </div>

    <button onclick="uploadImage()">Upload Image</button>

    <h3>Response:</h3>
    <pre id="response">Waiting for upload...</pre>

    <script>
        async function uploadImage() {
            const token = document.getElementById('token').value;
            const fileInput = document.getElementById('image');
            const responseDisplay = document.getElementById('response');

            if (!token) {
                alert("Please paste your Vendor Token first!");
                return;
            }

            if (fileInput.files.length === 0) {
                alert("Please select an image file first!");
                return;
            }

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            responseDisplay.textContent = "Uploading...";

            try {
                const response = await fetch('http://localhost:5000/api/products/upload-image', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                const data = await response.json();
                responseDisplay.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                responseDisplay.textContent = "Error: " + error.message;
            }
        }
    </script>
</body>
</html>
